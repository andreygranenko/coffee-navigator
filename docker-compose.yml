services:
  api:
    image: python:3.12-slim
    container_name: riga_navigator_api
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r backend/requirements.txt &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: riga_navigator_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: riga_navigator
      POSTGRES_USER: riga
      POSTGRES_PASSWORD: riga_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riga -d riga_navigator"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
